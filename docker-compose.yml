services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: dev_db
    ports:
      - "5432:5432" # So you can connect with GUI like TablePlus
    volumes:
      - postgres_data:/var/lib/postgresql/data # Keep db data persistent over container shutdown & restart

  frontend:
    build:
      context: ./simple_frontend
      dockerfile: Dockerfile
    container_name: simple_frontend_container
    ports:
      - "80:80"
    networks:
      - web-network
    depends_on:
      - backend

  backend:
    build:
      context: ./simple_backend
      dockerfile: Dockerfile
    container_name: simple_backend_container
    volumes:
      - ./simple_backend:/app # Bind Mounts
      - /app/node_modules # Anonymous volume keeps these folders seperate from coding environment
    # We don't need to map ports to the host if only Nginx needs to talk to it
    expose:
      - "5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://user:pass@db:5432/mydb
    networks:
      - web-network
    depends_on:
      - db

networks:
  web-network:
    driver: bridge

volumes:
  postgres_data:
